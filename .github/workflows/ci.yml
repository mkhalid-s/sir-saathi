name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest
      - name: Sensitive-data scan
        run: python scripts/check_sensitive.py
      - name: Python tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest
      - name: Parser smoke compile
        run: python -m py_compile pipeline/parse_2002.py pipeline/transliterate.py
      - name: Transliteration smoke test
        run: python pipeline/transliterate.py --test
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install web dependencies
        run: npm ci
      - name: Build web PWA
        run: ASTRO_TELEMETRY_DISABLED=1 npm run web:build
      - name: Launch gate
        run: python scripts/launch_gate.py
      - name: Slice gate
        run: python scripts/slice_gate.py
