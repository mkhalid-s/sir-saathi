# Local development only. Do not use this compose file for production.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sir_saathi
      POSTGRES_USER: sir_saathi
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_secret
    ports:
      - "127.0.0.1:5432:5432"
    secrets:
      - pg_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

secrets:
  pg_secret:
    file: ./.secrets/pg_secret

volumes:
  postgres-data:
