services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sir_saathi
      POSTGRES_USER: sir_saathi
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  postgres-data:
